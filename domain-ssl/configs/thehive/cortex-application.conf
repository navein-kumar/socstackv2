# Cortex 3.1.8 Configuration with Keycloak SSO
# Domain-SSL mode: domain-based URLs, Let's Encrypt SSL
# tokenUrl/userUrl MUST use the public SSO URL (not internal container hostname)
# Reason: Keycloak's token issuer (iss) differs between internal (http://host:8080)
# and external (https://domain) access. Using internal URLs causes issuer mismatch
# when validating tokens at the userinfo endpoint, resulting in 401 errors.
# Placeholders replaced at deploy time by post-deploy.py Step 6

play.http.secret.key = "YOUR_CORTEX_SECRET"

search {
  index = cortex
  uri = "http://socstack-elasticsearch:9200"
}

# ============================================================
# AUTHENTICATION - Local + Keycloak OAuth2
# ============================================================
auth {
  provider = [local, oauth2]

  local {
    allowRegistration = false
  }

  # Keycloak OAuth2/OIDC
  oauth2 {
    clientId = "YOUR_SSO_CLIENT_ID"
    clientSecret = "WILL_BE_SET_BY_POST_DEPLOY"
    redirectUri = "https://YOUR_CORTEX_DOMAIN/api/ssoLogin"
    responseType = "code"
    grantType = "authorization_code"
    # Browser-facing URL (user redirect via NPM)
    authorizationUrl = "https://YOUR_SSO_DOMAIN/realms/YOUR_SSO_REALM/protocol/openid-connect/auth"
    authorizationHeader = "Bearer"
    # Token + userinfo URLs must go through NPM (public URL) to match the token issuer
    tokenUrl = "https://YOUR_SSO_DOMAIN/realms/YOUR_SSO_REALM/protocol/openid-connect/token"
    userUrl = "https://YOUR_SSO_DOMAIN/realms/YOUR_SSO_REALM/protocol/openid-connect/userinfo"
    scope = ["openid", "email", "profile"]
  }

  # SSO user mapping
  sso {
    autocreate = true
    autoupdate = true
    autologin = false
    mapper = "group"

    attributes {
      login = "email"
      name = "name"
      groups = "groups"
    }

    defaultOrganization = "YOUR_CORTEX_ORG_NAME"
    defaultRoles = ["read", "analyze"]

    groups {
      mappings {
        soc-admin    = ["superadmin"]
        soc-analyst  = ["read", "analyze", "orgadmin"]
        soc-readonly = ["read"]
      }
    }
  }
}

# ============================================================
# ANALYZERS & RESPONDERS
# ============================================================
analyzer {
  urls = ["https://download.thehive-project.org/analyzers.json"]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}

responder {
  urls = ["https://download.thehive-project.org/responders.json"]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}

job {
  runner = [docker]
}

docker {
  autoRemove = true
}

# ============================================================
# HTTP HEADER SIZE - Large JWT tokens from Keycloak
# ============================================================
# Default is 8192 bytes — Keycloak JWTs with groups claims exceed this
play.server.akka.max-header-size = 65536
play.server.netty.maxHeaderSize = 65536
