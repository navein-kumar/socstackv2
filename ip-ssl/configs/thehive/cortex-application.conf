# Cortex 3.1.8 Configuration with Keycloak SSO
# IP-SSL mode: SOC realm, soc-sso client, IP:PORT URLs
# tokenUrl/userUrl MUST use the public SSO URL (not internal container hostname)
# Reason: Keycloak's token issuer (iss) differs between internal (http://host:8080)
# and external (https://IP:PORT) access. Using internal URLs causes issuer mismatch
# when validating tokens at the userinfo endpoint, resulting in 401 errors.
# Note: Cortex JVM must trust the self-signed CA (mounted via docker-compose)
# Placeholders replaced at deploy time by post-deploy.py Step 5

play.http.secret.key = "YOUR_CORTEX_SECRET"

search {
  index = cortex
  uri = "http://socstack-elasticsearch:9200"
}

# ============================================================
# AUTHENTICATION - Local + Keycloak OAuth2
# ============================================================
auth {
  provider = [local, oauth2]

  local {
    allowRegistration = false
  }

  # Keycloak OAuth2/OIDC
  oauth2 {
    clientId = "YOUR_SSO_CLIENT_ID"
    clientSecret = "WILL_BE_SET_BY_POST_DEPLOY"
    redirectUri = "https://YOUR_SERVER_IP:YOUR_CORTEX_PORT/api/ssoLogin"
    responseType = "code"
    grantType = "authorization_code"
    # Browser-facing URL (user redirect via nginx)
    authorizationUrl = "https://YOUR_SERVER_IP:YOUR_SSO_PORT/realms/YOUR_SSO_REALM/protocol/openid-connect/auth"
    authorizationHeader = "Bearer"
    # Token + userinfo URLs must go through nginx (public URL) to match the token issuer
    tokenUrl = "https://YOUR_SERVER_IP:YOUR_SSO_PORT/realms/YOUR_SSO_REALM/protocol/openid-connect/token"
    userUrl = "https://YOUR_SERVER_IP:YOUR_SSO_PORT/realms/YOUR_SSO_REALM/protocol/openid-connect/userinfo"
    scope = ["openid", "email", "profile"]
  }

  # SSO user mapping
  sso {
    autocreate = true
    autoupdate = true
    autologin = false
    mapper = "group"

    attributes {
      login = "email"
      name = "name"
      groups = "groups"
    }

    defaultOrganization = "YOUR_CORTEX_ORG_NAME"
    defaultRoles = ["read", "analyze"]

    groups {
      mappings {
        soc-admin    = ["superadmin"]
        soc-analyst  = ["read", "analyze", "orgadmin"]
        soc-readonly = ["read"]
      }
    }
  }
}

# ============================================================
# ANALYZERS & RESPONDERS
# ============================================================
analyzer {
  urls = ["https://download.thehive-project.org/analyzers.json"]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}

responder {
  urls = ["https://download.thehive-project.org/responders.json"]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}

job {
  runner = [docker]
}

docker {
  autoRemove = true
}

# ============================================================
# HTTP HEADER SIZE - IP-SSL cookie accumulation fix
# ============================================================
# In IP-SSL mode, all services share one IP. The browser sends ALL cookies
# for that IP to every port. Combined with Keycloak JWT tokens, total headers
# can exceed Akka HTTP's default 8KB per-header-value limit.
# akka.http.server.parsing.max-header-value-length is the ACTUAL limit
# that controls the "431 Request Header Fields Too Large" error.
play.server.akka.max-header-size = 65536
play.server.netty.maxHeaderSize = 65536

akka.http.server.parsing {
  max-header-value-length = 32768
  max-header-count = 128
  max-uri-length = 16384
}
