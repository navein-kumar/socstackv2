# SOC Stack IP-SSL: Custom port server blocks
# Mounted into NPM at /data/nginx/custom/http.conf
# NPM includes this file inside its http{} block automatically.
# Cert: /certs/server.crt (self-signed, IP SAN, generated by pre-deploy.sh)
#
# Ports match docker-compose defaults: 8443-8448
# If you changed ports in .env, update the listen + X-Forwarded-Port values below.

# NOTE: resolver is already set by NPM. Using variables for proxy_pass
# (set $upstream + proxy_pass $upstream) means nginx resolves upstream
# hostnames at request time, not at config load. This prevents nginx
# from refusing to start when an upstream container is temporarily down.

# Map Upgrade header: WebSocket -> "upgrade", SSE/plain HTTP -> "keep-alive"
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       keep-alive;
}

# ── 8443: Wazuh Dashboard ──────────────────────────────────
server {
    listen 8443 ssl;
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    large_client_header_buffers 4 32k;
    proxy_buffer_size           16k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size     32k;

    location / {
        set $upstream           https://socstack-wazuh-dashboard:5601;
        proxy_pass              $upstream;
        proxy_ssl_verify        off;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
    }
}

# ── 8444: Keycloak SSO ────────────────────────────────────
server {
    listen 8444 ssl;
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    large_client_header_buffers 4 128k;
    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;

    location / {
        set $upstream           http://socstack-keycloak:8080;
        proxy_pass              $upstream;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_set_header        X-Forwarded-Port  8444;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
    }
}

# ── 8445: n8n (via oauth2-proxy) ─────────────────────────
server {
    listen 8445 ssl;
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    large_client_header_buffers 4 32k;
    proxy_buffer_size           16k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size     32k;

    location / {
        set $upstream           http://socstack-oauth2-proxy-n8n:4180;
        proxy_pass              $upstream;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $http_host;
        proxy_set_header        X-Forwarded-Port  8445;
        # n8n origin validator requires Origin header for SSE push connections.
        # EventSource (SSE) in browsers omits Origin for same-origin requests,
        # so nginx injects it here. Must match X-Forwarded-Host exactly.
        proxy_set_header        Origin "https://$http_host";
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
        # SSE push endpoint requires unbuffered streaming
        proxy_buffering         off;
        proxy_cache             off;
    }
}

