# SOC Stack IP-SSL: Custom port server blocks
# Mounted into NPM at /data/nginx/custom/http.conf
# NPM includes this file inside its http{} block automatically.
# Cert: /certs/server.crt (self-signed, IP SAN, generated by pre-deploy.sh)
#
# Ports match docker-compose defaults: 8443-8448
# If you changed ports in .env, update the listen + X-Forwarded-Port values below.

# NOTE: resolver is already set by NPM. Using variables for proxy_pass
# (set $upstream + proxy_pass $upstream) means nginx resolves upstream
# hostnames at request time, not at config load. This prevents nginx
# from refusing to start when an upstream container is temporarily down.

# ── HTTP-level header buffer size ──────────────────────────
# MUST be set at http level (not just server level) because nginx parses
# headers BEFORE selecting a server block. With Keycloak SSO, the browser
# sends large cookies (session tokens for all services share the same IP).
# Default 8KB is too small when multiple SSO services are logged in.
large_client_header_buffers 4 64k;

# ── Lua: Cookie isolation for IP-SSL mode ──────────────────
# PROBLEM: In IP-SSL mode all 6 services share one IP (e.g. 173.212.233.86).
# Browsers send ALL cookies for an IP to every port. When a user logs into
# multiple services, the accumulated Cookie header (Keycloak sessions,
# oauth2-proxy tokens, service sessions) can exceed 16-32KB, causing
# 400/431 errors at upstream services (MISP nginx, Cortex Akka, Node.js).
#
# FIX: BLACKLIST approach — each port strips only the known LARGE cookies
# belonging to OTHER services. Unknown/small cookies pass through safely.
# This avoids the fragility of whitelisting (missing a cookie breaks SSO).
#
# Cookie patterns per service (all lowercase for matching):
#   Keycloak:  keycloak_identity, keycloak_session, auth_session_id, kc_restart
#   n8n:       _n8n_oauth2
#   TheHive:   _hive_oauth2, thehive, play_session (shared w/ Cortex)
#   Cortex:    cortex, play_session (shared w/ TheHive)
#   MISP:      cakephp, mod_auth_openidc, csrftoken, misp
#   Wazuh:     security_authentication, security_, opensearch
init_by_lua_block {
    -- Strip cookies: REMOVE those matching any pattern in the blacklist.
    -- Everything else passes through untouched (safe default).
    -- All patterns are lowercase; cookie names are lowercased before matching.
    function strip_cookies(blocked_patterns)
        local raw = ngx.var.http_cookie
        if not raw or raw == "" then return end

        local kept = {}
        for cookie in raw:gmatch("[^;]+") do
            local trimmed = cookie:match("^%s*(.-)%s*$")
            local name = trimmed:match("^([^=]+)")
            if name then
                local lname = name:match("^%s*(.-)%s*$"):lower()
                local dominated = false
                for _, pat in ipairs(blocked_patterns) do
                    if lname:find(pat) then
                        dominated = true
                        break
                    end
                end
                if not dominated then
                    kept[#kept + 1] = trimmed
                end
            end
        end

        if #kept > 0 then
            ngx.req.set_header("Cookie", table.concat(kept, "; "))
        else
            ngx.req.clear_header("Cookie")
        end
    end
}

# Map Upgrade header: WebSocket -> "upgrade", SSE/plain HTTP -> "keep-alive"
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       keep-alive;
}

# ── 8443: Wazuh Dashboard ──────────────────────────────────
server {
    listen 8443 ssl;
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    large_client_header_buffers 4 64k;
    proxy_buffer_size           16k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size     32k;

    location / {
        # Strip ALL other services' cookies (keep only Wazuh's own)
        access_by_lua_block { strip_cookies({"^_n8n_oauth2", "^_hive_oauth2", "^keycloak_identity", "^keycloak_session", "^auth_session_id", "^kc_restart", "^cakephp", "^mod_auth_openidc", "^misp", "^cortex", "^thehive", "^play_session"}) }

        set $upstream           https://socstack-wazuh-dashboard:5601;
        proxy_pass              $upstream;
        proxy_ssl_verify        off;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
    }
}

# ── 8444: Keycloak SSO ────────────────────────────────────
server {
    listen 8444 ssl;
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    # Keycloak needs large buffers — its own cookies + OIDC state are big
    large_client_header_buffers 4 128k;
    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;

    location / {
        # Keycloak: strip ALL other services' cookies (keep only Keycloak's own)
        access_by_lua_block { strip_cookies({"^_n8n_oauth2", "^_hive_oauth2", "^cakephp", "^mod_auth_openidc", "^misp", "^cortex", "^thehive", "^play_session", "^security_authentication", "^opensearch"}) }

        set $upstream           http://socstack-keycloak:8080;
        proxy_pass              $upstream;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_set_header        X-Forwarded-Port  8444;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
    }
}

# ── 8445: n8n (via oauth2-proxy) ─────────────────────────
server {
    listen 8445 ssl;
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    large_client_header_buffers 4 64k;
    proxy_buffer_size           16k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size     32k;

    location / {
        # Strip ALL other services' cookies (keep only n8n's own)
        access_by_lua_block { strip_cookies({"^_hive_oauth2", "^keycloak_identity", "^keycloak_session", "^auth_session_id", "^kc_restart", "^cakephp", "^mod_auth_openidc", "^misp", "^cortex", "^thehive", "^play_session", "^security_authentication", "^opensearch"}) }

        set $upstream           http://socstack-oauth2-proxy-n8n:4180;
        proxy_pass              $upstream;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host  $http_host;
        proxy_set_header        X-Forwarded-Port  8445;
        # n8n origin validator requires Origin header for SSE push connections.
        # EventSource (SSE) in browsers omits Origin for same-origin requests,
        # so nginx injects it here. Must match X-Forwarded-Host exactly.
        proxy_set_header        Origin "https://$http_host";
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
        # SSE push endpoint requires unbuffered streaming
        proxy_buffering         off;
        proxy_cache             off;
    }
}

